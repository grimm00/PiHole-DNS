# PiHole-DNS — Docker Compose Stack
# Layer 0 (MVP): Pi-Hole DNS server
# Layer 1 (planned): Add OurFileServer, local DNS records
#
# Prerequisites:
#   - Stable LAN IPv4 for the Pi (e.g. router DHCP reservation — see ADR-001)
#   - Docker and Docker Compose installed
#
# Usage:
#   docker compose up -d
#   docker compose logs -f pihole

services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "80:80/tcp"
    environment:
      # US Central (Chicago). Set to another IANA time zone if your Pi is elsewhere.
      TZ: 'America/Chicago'
      # Pi-hole v6: use FTLCONF_* (see docs/maintainers/research/layer-0-foundation/research-stage-2-pihole-compose.md)
      FTLCONF_dns_listeningMode: 'ALL'
      FTLCONF_misc_etc_dnsmasq_d: 'true'
      FTLCONF_webserver_api_password: ${FTLCONF_webserver_api_password}
    volumes:
      - ./etc-pihole:/etc/pihole
      - ./etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
